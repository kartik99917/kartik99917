name: Daily Repository Health Maintenance

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repository-health-maintenance
  cancel-in-progress: false

jobs:
  maintain-repo-health:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run deterministic repository health maintenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          chmod +x scripts/maintenance/run-maintenance.sh
          chmod +x scripts/maintenance/maintain_docs.py
          chmod +x scripts/maintenance/maintain_repo_health.py
          scripts/maintenance/run-maintenance.sh

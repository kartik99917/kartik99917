name: Daily Documentation Maintenance

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-documentation-maintenance
  cancel-in-progress: false

jobs:
  maintain-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run deterministic documentation maintenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          chmod +x scripts/maintenance/run-maintenance.sh
          scripts/maintenance/run-maintenance.sh

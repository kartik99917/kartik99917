<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" width="900" height="80">
  <style>
    /* Cat walks from left to right, loops forever */
    .walker {
      animation: walk 9s linear infinite;
    }
    @keyframes walk {
      0%   { transform: translateX(-90px); }
      100% { transform: translateX(960px); }
    }

    /* Legs swing alternately */
    .fl { animation: frontleg 0.28s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: top center; }
    .bl { animation: backleg  0.28s ease-in-out infinite alternate-reverse; transform-box: fill-box; transform-origin: top center; }
    @keyframes frontleg {
      0%   { transform: rotate(-22deg); }
      100% { transform: rotate(22deg);  }
    }
    @keyframes backleg {
      0%   { transform: rotate(-22deg); }
      100% { transform: rotate(22deg);  }
    }

    /* Tail sways */
    .tail { animation: sway 0.5s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: 100% 100%; }
    @keyframes sway {
      0%   { transform: rotate(-15deg); }
      100% { transform: rotate(20deg);  }
    }

    /* Head bobs */
    .head { animation: bob 0.56s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: bottom center; }
    @keyframes bob {
      0%   { transform: translateY(0px);  }
      100% { transform: translateY(-2px); }
    }
  </style>

  <g class="walker">

    <!-- TAIL -->
    <g class="tail" transform="translate(0,0)">
      <path d="M14 38 Q-4 28 -2 14 Q0 6 6 8" stroke="#c4cfe0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- BODY -->
    <ellipse cx="32" cy="42" rx="22" ry="14" fill="#b0bec5"/>

    <!-- BACK LEGS -->
    <g class="bl"><rect x="13" y="52" width="6" height="18" rx="3" fill="#90a4ae"/></g>
    <g class="bl"><rect x="22" y="52" width="6" height="18" rx="3" fill="#90a4ae"/></g>

    <!-- FRONT LEGS -->
    <g class="fl"><rect x="35" y="52" width="6" height="18" rx="3" fill="#90a4ae"/></g>
    <g class="fl"><rect x="44" y="52" width="6" height="18" rx="3" fill="#90a4ae"/></g>

    <!-- HEAD -->
    <g class="head">
      <circle cx="53" cy="32" r="13" fill="#b0bec5"/>

      <!-- EARS -->
      <polygon points="44,22 47,11 53,21" fill="#b0bec5"/>
      <polygon points="53,21 59,11 62,22" fill="#b0bec5"/>
      <!-- Inner ear -->
      <polygon points="45,21 48,14 52,21" fill="#f8bbd0" opacity="0.7"/>
      <polygon points="54,21 58,14 61,21" fill="#f8bbd0" opacity="0.7"/>

      <!-- EYES -->
      <ellipse cx="49" cy="31" rx="2.5" ry="3" fill="#263238"/>
      <ellipse cx="57" cy="31" rx="2.5" ry="3" fill="#263238"/>
      <!-- Eye shine -->
      <circle cx="50" cy="30" r="0.8" fill="white"/>
      <circle cx="58" cy="30" r="0.8" fill="white"/>

      <!-- NOSE -->
      <ellipse cx="53" cy="36" rx="2" ry="1.2" fill="#f48fb1"/>

      <!-- WHISKERS left -->
      <line x1="53" y1="36" x2="37" y2="34" stroke="#e0e0e0" stroke-width="0.8" opacity="0.9"/>
      <line x1="53" y1="37" x2="37" y2="38" stroke="#e0e0e0" stroke-width="0.8" opacity="0.9"/>
      <!-- WHISKERS right -->
      <line x1="53" y1="36" x2="68" y2="34" stroke="#e0e0e0" stroke-width="0.8" opacity="0.9"/>
      <line x1="53" y1="37" x2="68" y2="38" stroke="#e0e0e0" stroke-width="0.8" opacity="0.9"/>

      <!-- MOUTH -->
      <path d="M51 38 Q53 40 55 38" stroke="#90a4ae" stroke-width="1" fill="none" stroke-linecap="round"/>
    </g>

  </g>
</svg>
